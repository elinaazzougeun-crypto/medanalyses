{% extends "base.html" %}

{% block content %}

<div class="mb-3">
    <a href="{% url 'analyses' %}" class="btn btn-secondary">⬅ Retour</a>
</div>

<div class="card shadow p-4" style="max-width: 500px;">
    <h2 class="mb-4">✏️ Modifier l'Analyse</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Patient</label>
            <select name="patient" class="form-select" required>
                {% for p in patients %}
                <option value="{{ p.id }}" 
                    {% if p.id == analyse.patient.id %}selected{% endif %}>
                    {{ p.nom }} {{ p.prenom }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Type d'analyse</label>
            <input type="text" name="type_analyse" class="form-control" 
                   value="{{ analyse.type_analyse }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Statut</label>
            <select name="statut" class="form-select" required>
                <option value="en_attente" 
                    {% if analyse.statut == "en_attente" %}selected{% endif %}>
                    ⏳ En attente
                </option>
                <option value="termine" 
                    {% if analyse.statut == "termine" %}selected{% endif %}>
                    ✅ Terminé
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-warning w-100">💾 Enregistrer</button>
    </form>
</div>

{% endblock %}
